<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>學生AI課程問卷調查</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','Helvetica Neue',Arial,sans-serif;background:#f5f5f3;min-height:100vh;padding:2rem 1rem;}
.wrap{max-width:620px;margin:0 auto;}
.page-title{font-size:22px;font-weight:600;color:#1a1a1a;margin-bottom:4px;}
.page-sub{font-size:14px;color:#888;margin-bottom:1.5rem;}
.card{background:#fff;border:1px solid #e8e8e4;border-radius:14px;padding:1.25rem;margin-bottom:1rem;}
.card label{font-size:13px;color:#888;display:block;margin-bottom:6px;}
.card input[type=text],.card input[type=password]{width:100%;padding:9px 12px;font-size:15px;border:1px solid #ddd;border-radius:8px;background:#fff;color:#1a1a1a;outline:none;transition:border 0.15s;}
.card input:focus{border-color:#534AB7;}
.section-title{font-size:15px;font-weight:600;color:#1a1a1a;margin-bottom:4px;}
.section-sub{font-size:12px;color:#aaa;margin-bottom:14px;}
.option-row{display:flex;align-items:flex-start;gap:10px;padding:11px 13px;border:1px solid #e8e8e4;border-radius:10px;margin-bottom:8px;cursor:pointer;transition:all 0.15s;user-select:none;}
.option-row:hover{background:#f9f9f7;}
.option-row.checked{border-color:#534AB7;background:#EEEDFE;}
.checkbox{width:20px;height:20px;border-radius:5px;border:1.5px solid #ccc;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px;font-size:12px;font-weight:700;transition:all 0.15s;}
.option-row.checked .checkbox{background:#534AB7;border-color:#534AB7;color:#fff;}
.opt-label{font-size:13px;font-weight:700;color:#534AB7;margin-right:6px;flex-shrink:0;}
.option-row:not(.checked) .opt-label{color:#bbb;}
.opt-text{font-size:14px;color:#1a1a1a;line-height:1.5;}
.option-row.checked .opt-text{color:#26215C;}
.btn{display:inline-flex;align-items:center;gap:6px;padding:10px 22px;border-radius:9px;border:1px solid #ddd;background:#fff;color:#1a1a1a;font-size:14px;cursor:pointer;transition:all 0.15s;font-weight:500;}
.btn:hover{background:#f5f5f3;}
.btn-primary{background:#534AB7;color:#fff;border-color:#534AB7;}
.btn-primary:hover{background:#3C3489;}
.btn-sm{padding:7px 14px;font-size:13px;}
.btn:disabled{opacity:0.5;cursor:not-allowed;}
.err{font-size:13px;color:#A32D2D;margin-bottom:10px;padding:9px 13px;background:#FCEBEB;border-radius:9px;}
.ok{font-size:13px;color:#085041;margin-bottom:10px;padding:9px 13px;background:#E1F5EE;border-radius:9px;}
.nav{display:flex;gap:8px;align-items:center;flex-wrap:wrap;margin-top:1rem;}
.done-wrap{text-align:center;padding:2.5rem 1rem;}
.done-icon{width:64px;height:64px;border-radius:50%;background:#EEEDFE;display:flex;align-items:center;justify-content:center;margin:0 auto 1rem;font-size:30px;}
.done-title{font-size:18px;font-weight:600;color:#1a1a1a;margin-bottom:6px;}
.done-sub{font-size:13px;color:#888;margin-bottom:1.5rem;}
.chosen-list{text-align:left;background:#f9f9f7;border-radius:10px;padding:14px 16px;margin-bottom:1.5rem;}
.chosen-item{font-size:13px;color:#1a1a1a;padding:5px 0;display:flex;gap:8px;}
.chosen-dot{color:#534AB7;font-weight:700;flex-shrink:0;}
/* admin */
.admin-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:1.25rem;}
.admin-header h2{font-size:17px;font-weight:600;color:#1a1a1a;}
.badge{display:inline-flex;align-items:center;background:#534AB7;color:#fff;font-size:11px;font-weight:700;border-radius:20px;padding:2px 8px;margin-left:6px;}
.resp-row{background:#fff;border:1px solid #e8e8e4;border-radius:10px;padding:11px 14px;margin-bottom:7px;}
.resp-name{font-weight:600;font-size:14px;color:#1a1a1a;}
.resp-id{color:#aaa;font-size:12px;margin-left:6px;}
.resp-time{font-size:11px;color:#bbb;margin-top:2px;}
.resp-tags{margin-top:6px;display:flex;flex-wrap:wrap;gap:4px;}
.tag{background:#EEEDFE;color:#3C3489;font-size:11px;padding:3px 9px;border-radius:20px;font-weight:500;}
.loading-txt{text-align:center;color:#aaa;font-size:14px;padding:2rem;}
.spinner{display:inline-block;width:20px;height:20px;border:2px solid #ddd;border-top-color:#534AB7;border-radius:50%;animation:spin .7s linear infinite;vertical-align:middle;margin-right:8px;}
@keyframes spin{to{transform:rotate(360deg);}}
@media(max-width:480px){body{padding:1rem .75rem;}.page-title{font-size:19px;}}
</style>
</head>
<body>
<div class="wrap" id="app"></div>
<script>
const NOTION_DS = '3e6e82c3-5d50-446c-977f-458873309fd8';
const ADMIN_EMAIL = 'jeff@redball.com.tw';
const ADMIN_PASS = 'shyy3503';

const OPTIONS = [
  {key:'A', text:'影片生成（短片、商業影片製作）'},
  {key:'B', text:'內容（社群圖片／文章內容製作）'},
  {key:'C', text:'經營自己，成為網紅／IP'},
  {key:'D', text:'AI工作效率提升'},
  {key:'E', text:'Vibe Coding，學Claude Code開發程式'},
  {key:'F', text:'想學設計Agent，工作自動化（養龍蝦）🦞'},
];

let state = {
  screen: 'form',
  studentId: '', studentName: '', checked: [], error: '', submitting: false,
  adminError: '', adminUser: '', adminPass: '', adminLoggedIn: false,
  responses: [], loadingResponses: false
};

const app = () => document.getElementById('app');
function render(){
  app().innerHTML =
    state.screen==='form'  ? renderForm()  :
    state.screen==='done'  ? renderDone()  :
    state.screen==='login' ? renderLogin() : renderAdmin();
  bind();
}

/* ── FORM ── */
function renderForm(){
  const opts = OPTIONS.map(o=>{
    const on = state.checked.includes(o.key);
    return `<div class="option-row${on?' checked':''}" data-key="${o.key}">
      <div class="checkbox">${on?'✓':''}</div>
      <div><span class="opt-label">${o.key}</span><span class="opt-text">${o.text}</span></div>
    </div>`;
  }).join('');
  const sub = state.checked.length ? `已選 <strong>${state.checked.length}</strong> 項` : '請至少選 1 項';
  return `
    <p class="page-title">學生AI課程問卷調查</p>
    <p class="page-sub">選修目的調查 · 填完即完成</p>
    <div class="card"><label>學號</label><input type="text" id="sid" placeholder="例：B12345678" value="${esc(state.studentId)}"></div>
    <div class="card"><label>姓名</label><input type="text" id="nm" placeholder="請輸入您的姓名" value="${esc(state.studentName)}"></div>
    <div class="card">
      <div class="section-title">你選修 AI 課程的目的是？</div>
      <div class="section-sub">可複選 · ${sub}</div>
      ${opts}
    </div>
    ${state.error?`<div class="err">${state.error}</div>`:''}
    <div class="nav">
      <button class="btn btn-primary" id="submitBtn" ${state.submitting?'disabled':''}>
        ${state.submitting?'<span class="spinner"></span>提交中…':'提交問卷'}
      </button>
    </div>
    <div style="margin-top:2.5rem;text-align:right;">
      <a href="#" id="adminLink" style="font-size:12px;color:#bbb;text-decoration:none;">管理者登入</a>
    </div>`;
}

/* ── DONE ── */
function renderDone(){
  const chosen = state.checked.map(k=>{
    const o = OPTIONS.find(x=>x.key===k);
    return `<div class="chosen-item"><span class="chosen-dot">✓</span>${o.key}. ${o.text}</div>`;
  }).join('');
  return `
    <div class="done-wrap">
      <div class="done-icon">🎉</div>
      <div class="done-title">問卷提交成功！</div>
      <div class="done-sub">${esc(state.studentName)}（${esc(state.studentId)}），感謝你的填寫 🙌</div>
      <div class="chosen-list">${chosen}</div>
      <button class="btn" id="newBtn">再填一份</button>
    </div>`;
}

/* ── LOGIN ── */
function renderLogin(){
  return `
    <p class="page-title" style="margin-bottom:1.5rem;">管理者登入</p>
    <div class="card">
      <label>Email</label>
      <input type="text" id="aUser" placeholder="jeff@redball.com.tw" value="${esc(state.adminUser)}" style="margin-bottom:12px;">
      <label>密碼</label>
      <input type="password" id="aPass" placeholder="••••••••" value="${esc(state.adminPass)}">
    </div>
    ${state.adminError?`<div class="err">${state.adminError}</div>`:''}
    <div class="nav">
      <button class="btn btn-primary" id="loginBtn">登入</button>
      <button class="btn" id="backFormBtn">← 返回問卷</button>
    </div>`;
}

/* ── ADMIN ── */
function renderAdmin(){
  let body = '';
  if(state.loadingResponses){
    body = `<div class="loading-txt"><span class="spinner"></span>從 Notion 載入資料中…</div>`;
  } else if(!state.responses.length){
    body = `<div class="loading-txt">尚無回應資料</div>`;
  } else {
    body = state.responses.map(r=>{
      const tags = (r.choices||[]).map(k=>`<span class="tag">${k}. ${OPTIONS.find(x=>x.key===k)?.text?.slice(0,14)||k}…</span>`).join('');
      return `<div class="resp-row">
        <div><span class="resp-name">${esc(r.name)}</span><span class="resp-id">${esc(r.studentId)}</span></div>
        <div class="resp-time">${esc(r.time)}</div>
        <div class="resp-tags">${tags}</div>
      </div>`;
    }).join('');
  }
  return `
    <div class="admin-header">
      <h2>問卷回應<span class="badge">${state.responses.length} 筆</span></h2>
      <div style="display:flex;gap:6px;">
        <button class="btn btn-sm" id="refreshBtn">重新整理</button>
        <button class="btn btn-sm btn-primary" id="dlBtn">匯出 Excel</button>
        <button class="btn btn-sm" id="logoutBtn">登出</button>
      </div>
    </div>
    <div id="respList">${body}</div>`;
}

/* ── NOTION submit ── */
async function submitToNotion(data){
  const props = {
    "姓名": data.name,
    "學號": data.studentId,
    "選擇代碼": data.choices.join('+'),
    "提交時間": data.time,
    "A-影片生成": data.choices.includes('A') ? '__YES__' : '__NO__',
    "B-社群內容": data.choices.includes('B') ? '__YES__' : '__NO__',
    "C-網紅IP":   data.choices.includes('C') ? '__YES__' : '__NO__',
    "D-AI效率":   data.choices.includes('D') ? '__YES__' : '__NO__',
    "E-Vibe Coding": data.choices.includes('E') ? '__YES__' : '__NO__',
    "F-Agent工作自動化": data.choices.includes('F') ? '__YES__' : '__NO__',
  };
  const res = await fetch('https://api.anthropic.com/v1/messages', {
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body: JSON.stringify({
      model:'claude-sonnet-4-20250514',
      max_tokens:500,
      mcp_servers:[{type:'url',url:'https://mcp.notion.com/mcp',name:'notion-mcp'}],
      messages:[{role:'user',content:`請用 notion-mcp 的 notion-create-pages 工具，在 data_source_id 為 "${NOTION_DS}" 的資料庫新增一筆資料，properties 如下（JSON）：${JSON.stringify(props)}。只需執行，不用說明。`}]
    })
  });
  if(!res.ok) throw new Error('API error '+res.status);
  return res.json();
}

/* ── NOTION fetch responses ── */
async function fetchFromNotion(){
  const res = await fetch('https://api.anthropic.com/v1/messages',{
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({
      model:'claude-sonnet-4-20250514',
      max_tokens:4000,
      mcp_servers:[{type:'url',url:'https://mcp.notion.com/mcp',name:'notion-mcp'}],
      messages:[{role:'user',content:`請用 notion-mcp 查詢 data_source_id 為 "${NOTION_DS}" 的資料庫，列出所有頁面的「姓名」「學號」「選擇代碼」「提交時間」欄位，回傳純 JSON 陣列格式，每筆格式為 {"name":"","studentId":"","choices":[],"time":""}，choices 是選擇代碼字串以 + 分割成的陣列。只回傳 JSON，不要其他文字。`}]
    })
  });
  const data = await res.json();
  const text = data.content?.filter(b=>b.type==='text').map(b=>b.text).join('') || '[]';
  try{
    const clean = text.replace(/```json|```/g,'').trim();
    return JSON.parse(clean);
  }catch(e){ return []; }
}

/* ── CSV export ── */
function dlCSV(){
  const h = ['學號','姓名','提交時間','A-影片生成','B-社群內容','C-網紅IP','D-AI效率','E-Vibe Coding','F-Agent工作自動化','選擇代碼'];
  const rows = state.responses.map(r=>[
    r.studentId, r.name, r.time,
    ...OPTIONS.map(o=>r.choices.includes(o.key)?'1':'0'),
    (r.choices||[]).join('+')
  ]);
  const csv = '\uFEFF'+[h,...rows].map(r=>r.map(c=>`"${String(c||'').replace(/"/g,'""')}"`).join(',')).join('\n');
  const b = new Blob([csv],{type:'text/csv;charset=utf-8'});
  const u = URL.createObjectURL(b);
  const a = document.createElement('a'); a.href=u; a.download='AI課程問卷調查.csv'; a.click();
  URL.revokeObjectURL(u);
}

function esc(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

/* ── BIND ── */
function bind(){
  const $=id=>document.getElementById(id);
  const on=(id,fn)=>{ const el=$(id); if(el) el.addEventListener('click',fn); };

  // form inputs
  const sid=$('sid'), nm=$('nm');
  if(sid) sid.addEventListener('input',e=>state.studentId=e.target.value);
  if(nm)  nm.addEventListener('input',e=>state.studentName=e.target.value);

  // option toggles
  document.querySelectorAll('[data-key]').forEach(el=>{
    el.addEventListener('click',()=>{
      const k=el.dataset.key;
      state.checked = state.checked.includes(k) ? state.checked.filter(x=>x!==k) : [...state.checked,k];
      state.error=''; render();
    });
  });

  on('submitBtn', async ()=>{
    state.studentId = state.studentId.trim();
    state.studentName = state.studentName.trim();
    if(!state.studentId){ state.error='請填寫學號'; render(); return; }
    if(!state.studentName){ state.error='請填寫姓名'; render(); return; }
    if(!state.checked.length){ state.error='請至少選擇一個選項'; render(); return; }
    state.submitting=true; state.error=''; render();
    try{
      await submitToNotion({
        studentId:state.studentId, name:state.studentName,
        choices:[...state.checked], time:new Date().toLocaleString('zh-TW')
      });
      state.screen='done'; state.submitting=false;
    }catch(e){
      state.submitting=false; state.error='提交失敗，請稍後再試。'; 
    }
    render();
  });

  on('newBtn', ()=>{ state.screen='form'; state.studentId=''; state.studentName=''; state.checked=[]; state.error=''; render(); });
  on('adminLink', e=>{ e.preventDefault(); state.screen='login'; render(); });
  on('backFormBtn', ()=>{ state.screen='form'; render(); });

  // login
  const au=$('aUser'), ap=$('aPass');
  if(au) au.addEventListener('input',e=>state.adminUser=e.target.value);
  if(ap) ap.addEventListener('input',e=>state.adminPass=e.target.value);
  on('loginBtn', async ()=>{
    if(state.adminUser.trim()===ADMIN_EMAIL && state.adminPass===ADMIN_PASS){
      state.adminLoggedIn=true; state.adminError=''; state.screen='admin';
      state.loadingResponses=true; render();
      state.responses = await fetchFromNotion();
      state.loadingResponses=false; render();
    } else {
      state.adminError='帳號或密碼錯誤'; render();
    }
  });

  on('logoutBtn', ()=>{ state.adminLoggedIn=false; state.screen='form'; state.adminUser=''; state.adminPass=''; render(); });
  on('refreshBtn', async ()=>{ state.loadingResponses=true; render(); state.responses=await fetchFromNotion(); state.loadingResponses=false; render(); });
  on('dlBtn', dlCSV);
}

render();
</script>
</body>
</html>
